<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFQX — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-darkest: #0C1420;
    --bg-dark: #131E30;
    --bg-mid: #1A2640;
    --bg-card: #1E2D45;
    --bg-input: #0F1A2B;
    --aqua: #57ACAF;
    --aqua-light: #7AC5C8;
    --aqua-glow: rgba(87, 172, 175, 0.15);
    --aqua-glow-strong: rgba(87, 172, 175, 0.3);
    --yellow: #EAB308;
    --yellow-dim: rgba(234, 179, 8, 0.15);
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(148, 163, 184, 0.12);
    --border-hover: rgba(148, 163, 184, 0.25);
    --error: #EF4444;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 200ms ease;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-darkest);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Gradient background with subtle pattern */
  .bg-gradient {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 120%, rgba(87, 172, 175, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(87, 172, 175, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 80% 10%, rgba(234, 179, 8, 0.03) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-darkest) 0%, var(--bg-dark) 50%, var(--bg-mid) 100%);
    z-index: 0;
  }

  /* Animated floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 20s ease-in-out infinite;
    z-index: 0;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: rgba(87, 172, 175, 0.06);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: rgba(234, 179, 8, 0.04);
    bottom: -80px; right: -80px;
    animation-delay: -7s;
  }
  .orb-3 {
    width: 250px; height: 250px;
    background: rgba(87, 172, 175, 0.05);
    top: 50%; right: 10%;
    animation-delay: -14s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -20px) scale(1.05); }
    50% { transform: translate(-20px, 30px) scale(0.95); }
    75% { transform: translate(20px, 20px) scale(1.02); }
  }

  /* Grid pattern overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Main layout */
  .login-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 440px;
    padding: 24px;
  }

  /* Logo area */
  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--aqua) 0%, #3D8E91 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(87, 172, 175, 0.3);
    position: relative;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(87, 172, 175, 0.4), transparent);
    z-index: -1;
    filter: blur(4px);
  }

  .logo-icon svg {
    width: 24px;
    height: 24px;
    fill: white;
  }

  .logo-text {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo-text span {
    color: var(--aqua);
  }

  .logo-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .powered-by {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .powered-by .fab-logo {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--yellow);
  }

  /* Login card */
  .login-card {
    width: 100%;
    background: rgba(30, 45, 69, 0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px 32px;
    box-shadow:
      0 24px 48px rgba(0, 0, 0, 0.3),
      0 0 0 1px rgba(87, 172, 175, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
    transition: border-color var(--transition);
  }

  .login-card:hover {
    border-color: var(--border-hover);
  }

  .card-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .card-header h1 {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .card-header p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Form */
  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 7px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color var(--transition);
  }

  .form-input {
    width: 100%;
    height: 46px;
    padding: 0 14px 0 42px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: all var(--transition);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .form-input:hover {
    border-color: var(--border-hover);
  }

  .form-input:focus {
    border-color: var(--aqua);
    box-shadow: 0 0 0 3px var(--aqua-glow);
  }

  .form-input:focus ~ .input-icon {
    color: var(--aqua);
  }

  /* Password visibility toggle */
  .password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color var(--transition);
  }

  .password-toggle:hover {
    color: var(--text-secondary);
  }

  .password-toggle svg {
    width: 18px;
    height: 18px;
  }

  /* Forgot password row */
  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .remember-me input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 1px solid var(--border-hover);
    border-radius: 4px;
    background: var(--bg-input);
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }

  .remember-me input[type="checkbox"]:checked {
    background: var(--aqua);
    border-color: var(--aqua);
  }

  .remember-me input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4.5px;
    top: 1.5px;
    width: 5px;
    height: 9px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .remember-me span {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .forgot-link {
    font-size: 13px;
    color: var(--aqua);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--transition);
  }

  .forgot-link:hover {
    color: var(--aqua-light);
    text-decoration: underline;
  }

  /* Buttons */
  .btn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--aqua) 0%, #3D9598 100%);
    color: white;
    box-shadow: 0 2px 8px rgba(87, 172, 175, 0.25);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(87, 172, 175, 0.35);
    filter: brightness(1.08);
  }

  .btn-primary:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px rgba(87, 172, 175, 0.2);
  }

  /* Shimmer effect on primary button */
  .btn-primary::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { left: -100%; }
    50% { left: 100%; }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .btn-google {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-primary);
  }

  .btn-google:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }

  .btn-google:active {
    transform: translateY(0);
  }

  .btn-google svg {
    width: 18px;
    height: 18px;
  }

  /* Footer links */
  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .card-footer a {
    color: var(--aqua);
    text-decoration: none;
    font-weight: 600;
    transition: color var(--transition);
  }

  .card-footer a:hover {
    color: var(--aqua-light);
    text-decoration: underline;
  }

  /* Bottom info */
  .bottom-info {
    margin-top: 32px;
    text-align: center;
  }

  .industry-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(87, 172, 175, 0.08);
    border: 1px solid rgba(87, 172, 175, 0.12);
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--aqua);
    letter-spacing: 0.5px;
  }

  .industry-badge .dot {
    width: 6px;
    height: 6px;
    background: var(--aqua);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; box-shadow: 0 0 6px var(--aqua); }
  }

  .bottom-info .copyright {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .bottom-info .copyright a {
    color: var(--yellow);
    text-decoration: none;
  }

  .bottom-info .copyright a:hover {
    text-decoration: underline;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .login-wrapper {
      padding: 20px 16px;
      max-width: 100%;
    }

    .login-card {
      padding: 28px 20px 24px;
      border-radius: 12px;
    }

    .logo-area {
      margin-bottom: 32px;
    }

    .logo-text {
      font-size: 24px;
    }

    .card-header h1 {
      font-size: 20px;
    }
  }

  @media (min-width: 1440px) {
    .login-card {
      padding: 40px 36px 36px;
    }
  }

  /* Focus visible for keyboard nav */
  :focus-visible {
    outline: 2px solid var(--aqua);
    outline-offset: 2px;
  }

  .form-input:focus-visible {
    outline: none;
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrapper">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z" fill="white" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">RFQ<span>X</span></span>
    </div>
    <span class="logo-subtitle">AI Quoting Intelligence</span>
    <div class="powered-by">
      powered by <span class="fab-logo">fabricXai</span>
    </div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="card-header">
      <h1>Welcome back</h1>
      <p>Sign in to manage your RFQ pipeline</p>
    </div>

    <form onsubmit="return false;">
      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrapper">
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="rahim@example.com"
            autocomplete="email"
          >
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13 2 4"/>
          </svg>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Options row -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Sign In Button -->
      <button type="submit" class="btn btn-primary">
        Sign in
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Google Sign In -->
      <button type="button" class="btn btn-google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      Don't have an account? <a href="#signup">Create account</a>
    </div>
  </div>

  <!-- Bottom info -->
  <div class="bottom-info">
    <div class="industry-badge">
      <span class="dot"></span>
      RMG &middot; Garment Manufacturing
    </div>
    <div class="copyright">
      &copy; 2026 <a href="#">fabricXai</a> by SocioFi Technology Ltd.
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>

</body>
</html>
